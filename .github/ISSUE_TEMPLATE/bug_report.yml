name: Bug Report
description: 报告一个 Bug
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提交 Bug 报告！请尽可能详细地填写以下信息，以便我们快速定位和修复问题。

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 简要描述遇到的问题
      placeholder: 清晰地描述 Bug 是什么
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 如何复现这个问题？
      placeholder: |
        1. 执行 '...'
        2. 调用 '...'
        3. 出现错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么？
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么？
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志 / 错误信息
      description: 如果有相关的日志或错误堆栈，请粘贴在这里
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: |
        请提供你的运行环境信息，例如：
        - OS: Ubuntu 22.04
        - Python: 3.12
        - replica 版本: v0.1.0
      placeholder: |
        - OS:
        - Python:
        - replica 版本:

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 其他任何可能有帮助的上下文信息
