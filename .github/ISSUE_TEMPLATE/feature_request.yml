name: Feature Request
description: 提出一个新功能建议
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提出功能建议！请描述你的想法，帮助我们改进 replica。

  - type: textarea
    id: problem
    attributes:
      label: 问题 / 动机
      description: 这个功能要解决什么问题？或者你的使用场景是什么？
      placeholder: 我在使用 ... 的时候，经常遇到 ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 描述你期望的功能表现
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你是否考虑过其他替代方案？

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 其他任何相关的上下文、截图或参考链接
