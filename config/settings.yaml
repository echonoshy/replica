# Replica Configuration
# Memory management service for AI applications

database:
  url: "postgresql+asyncpg://postgres:password@localhost:5432/replica"

# LLM Provider Configuration
llm:
  provider: "vllm"                   # vllm | openrouter | openai
  base_url: "http://localhost:19000/v1"
  api_key: "EMPTY"
  model: "Qwen3.5-122B-A10B-FP8"
  temperature: 0.3
  max_tokens: 128000
  timeout: 600
  max_retries: 5

# Embedding Provider Configuration
embedding:
  provider: "vllm"                   # vllm | openai
  base_url: "http://localhost:19001/v1"
  api_key: ""
  model: "Qwen3-Embedding-4B"
  dimensions: 2560
  timeout: 30
  max_retries: 3
  batch_size: 10

# Memory extraction
memory:
  language: "en"                     # en | zh
  min_messages_for_extraction: 3
  # Boundary detection
  boundary_max_tokens: 8192
  boundary_max_messages: 50
  # Profile extraction
  profile_min_memcells: 1
  profile_min_confidence: 0.6
  profile_life_max_items: 25

# Compaction
compaction:
  hard_threshold_tokens: 64000
  keep_recent_tokens: 32000

# Chunking
chunking:
  chunk_size_tokens: 400
  chunk_overlap_tokens: 80

# Search
search:
  vector_weight: 0.7
  text_weight: 0.3
  temporal_decay_half_life_days: 30
  mmr_enabled: true
  mmr_lambda: 0.7
  default_top_k: 10
  rrf_k: 60                         # RRF fusion parameter
